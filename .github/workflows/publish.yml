name: Publish Org Blog
on: 
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Emacs
        uses: purcell/setup-emacs@master
        with:
          version: 29.1
          
      - name: Render Org files to HTML
        run: emacs --batch --load build-blog.el
        
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./www
          force_orphan: true